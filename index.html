<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特化型・耳ともサポートPro</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 440px;
            width: 90%;
        }
        h1 { font-size: 22px; color: #1d1d1f; margin: 0 0 5px 0; }
        .subtitle { font-size: 14px; color: #86868b; margin-bottom: 15px; }
        
        button {
            font-size: 18px; font-weight: bold; padding: 16px 30px;
            border: none; border-radius: 15px; cursor: pointer;
            width: 100%; margin-top: 5px; transition: all 0.1s;
        }
        #startBtn { background-color: #0071e3; color: white; }
        #startBtn:active { background-color: #005bb5; transform: scale(0.98); }
        #stopBtn { background-color: #555; color: white; }
        #stopBtn:active { background-color: #333; transform: scale(0.98); }
        #stopBtn:disabled { background-color: #e5e5ea; color: #aeaeae; cursor:not-allowed; }
        
        /* EQパネルのスタイル */
        .eq-panel {
            margin-top: 20px;
            padding: 15px;
            background-color: #f5f5f7;
            border-radius: 14px;
            text-align: left;
        }
        .eq-section {
            border-bottom: 1px solid #e5e5ea;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .eq-section:last-child { border: none; padding-bottom: 0; margin-bottom: 0; }
        .eq-title { font-size: 13px; font-weight: bold; color: #86868b; margin-bottom: 5px; text-transform: uppercase;}
        .control-group { margin-bottom: 8px; }
        label { display: block; font-size: 14px; font-weight: bold; color: #1d1d1f; }
        input[type="range"] { width: 100%; margin-top: 4px; }
        .value-disp { float: right; font-weight: bold; color: #0071e3; }

        /* 文字起こしエリア */
        .speech-panel {
            margin-top: 20px;
            padding: 15px;
            background-color: #1d1d1f;
            color: #34c759;
            border-radius: 14px;
            text-align: left;
            min-height: 100px;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 15px;
            line-height: 1.4;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }
        #status { margin-top: 15px; font-size: 15px; font-weight: bold; color: #1d1d1f; }
    </style>
</head>
<body>

<div class="container">
    <h1>👂 耳ともサポート Pro</h1>
    <div class="subtitle">【3バンドEQ × リアルタイム文字起こし】</div>
    
    <button id="startBtn">▶ 集音＆文字起こし スタート</button>
    <button id="stopBtn" disabled>■ ストップ</button>
    
    <!-- 3バンド・イコライザーパネル -->
    <div class="eq-panel">
        <!-- 音声倍率（全体アンプ） -->
        <div class="eq-section">
            <div class="eq-title">🎚️ 全体マスターボリューム (音声倍率)</div>
            <div class="control-group">
                <label>音声倍率: <span id="volumeVal" class="value-disp">20 倍</span></label>
                <input type="range" id="volumeSlider" min="1" max="100" step="1" value="20">
            </div>
        </div>

        <!-- 低音域 -->
        <div class="eq-section">
            <div class="eq-title">🎸 低音域 (雑音・環境音カット用)</div>
            <div class="control-group">
                <label>周波数境界: <span id="lowFreqVal" class="value-disp">150 Hz</span></label>
                <input type="range" id="lowFreqSlider" min="60" max="350" step="10" value="150">
            </div>
            <div class="control-group">
                <label>増幅/減衰: <span id="lowGainVal" class="value-disp">-24 dB</span></label>
                <input type="range" id="lowGainSlider" min="-24" max="12" step="1" value="-24">
            </div>
        </div>

        <!-- 中音域 -->
        <div class="eq-section">
            <div class="eq-title">🗣️ 中音域 (人の声・主成分)</div>
            <div class="control-group">
                <label>中心周波数: <span id="midFreqVal" class="value-disp">1500 Hz</span></label>
                <input type="range" id="midFreqSlider" min="500" max="3000" step="50" value="1500">
            </div>
            <div class="control-group">
                <label>増幅/減衰: <span id="midGainVal" class="value-disp">12 dB</span></label>
                <input type="range" id="midGainSlider" min="-12" max="24" step="1" value="12">
            </div>
        </div>

        <!-- 高音域 -->
        <div class="eq-section">
            <div class="eq-title">⚡ 高音域 (言葉の輪郭・子音)</div>
            <div class="control-group">
                <label>周波数境界: <span id="highFreqVal" class="value-disp">4000 Hz</span></label>
                <input type="range" id="highFreqSlider" min="2500" max="6000" step="100" value="4000">
            </div>
            <div class="control-group">
                <label>増幅/減衰: <span id="highGainVal" class="value-disp">-24 dB</span></label>
                <input type="range" id="highGainSlider" min="-24" max="18" step="1" value="-24">
            </div>
        </div>
    </div>

    <!-- 文字起こしモニター -->
    <div class="speech-panel" id="speechResult">
        [ここに会話がテキスト化されます]
    </div>
    
    <div id="status">停止中</div>
</div>

<script>
// オーディオノード用変数
let audioCtx = null;
let mediaStreamSource = null;
let localStream = null;
let lowFilter = null;
let midFilter = null;
let highFilter = null;
let masterGain = null;
let splitter = null;
let merger = null;

// 音声認識用変数
let recognition = null;
let isRunning = false;

const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusText = document.getElementById('status');
const speechResult = document.getElementById('speechResult');
const volumeSlider = document.getElementById('volumeSlider');
const volumeVal = document.getElementById('volumeVal');

// UI要素とEQの連動設定
const sliders = {
    lowFreq: { el: document.getElementById('lowFreqSlider'), disp: document.getElementById('lowFreqVal'), unit: ' Hz', nodeProp: () => lowFilter.frequency },
    lowGain: { el: document.getElementById('lowGainSlider'), disp: document.getElementById('lowGainVal'), unit: ' dB', nodeProp: () => lowFilter.gain },
    midFreq: { el: document.getElementById('midFreqSlider'), disp: document.getElementById('midFreqVal'), unit: ' Hz', nodeProp: () => midFilter.frequency },
    midGain: { el: document.getElementById('midGainSlider'), disp: document.getElementById('midGainVal'), unit: ' dB', nodeProp: () => midFilter.gain },
    highFreq: { el: document.getElementById('highFreqSlider'), disp: document.getElementById('highFreqVal'), unit: ' Hz', nodeProp: () => highFilter.frequency },
    highGain: { el: document.getElementById('highGainSlider'), disp: document.getElementById('highGainVal'), unit: ' dB', nodeProp: () => highFilter.gain }
};

// スライダーイベントの一括登録
Object.keys(sliders).forEach(key => {
    sliders[key].el.addEventListener('input', (e) => {
        const val = e.target.value;
        sliders[key].disp.innerText = val + sliders[key].unit;
        if (audioCtx && isRunning) {
            sliders[key].nodeProp().setValueAtTime(parseFloat(val), audioCtx.currentTime);
        }
    });
});

// ボリュームスライダーの独立イベント処理
volumeSlider.addEventListener('input', (e) => {
    const val = e.target.value;
    volumeVal.innerText = val + " 倍";
    if (audioCtx && isRunning && masterGain) {
        masterGain.gain.setValueAtTime(parseFloat(val), audioCtx.currentTime);
    }
});

function initAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// 音声認識（文字起こし）の初期化
function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        speechResult.innerText = "⚠️ お使いのブラウザ・環境は文字起こしに非対応です。";
        return;
    }
    
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = true; // 話している途中の言葉も表示する
    recognition.continuous = true;     // 途切れても自動で終了せずスピーチを続ける
    
    recognition.onstart = () => {
        speechResult.innerText = "【文字起こし開始... 話しかけてください】\n";
    };
    
    recognition.onresult = (event) => {
        let interimTranscript = '';
        let finalTranscript = '';
        
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript + '\n';
            } else {
                interimTranscript += event.results[i][0].transcript;
            }
        }
        // 画面に表示（確定した文字を白、推測中の文字を緑っぽく表現などできますが、今回はシンプルに結合）
        speechResult.innerText = finalTranscript + (interimTranscript ? "☁️ " + interimTranscript : "");
        // 常に最下部までスクロール
        speechResult.scrollTop = speechResult.scrollHeight;
    };
    
    recognition.onerror = (event) => {
        console.error("音声認識エラー:", event.error);
        // 途中で切れた場合の自動復帰処理はstopBtnで制御
    };
    
    recognition.onend = () => {
        // ボタンが押されて停止したわけじゃないなら、認識を再スタートさせる（Safariのタイムアウト対策）
        if (isRunning) {
            recognition.start();
        }
    };
}

startBtn.addEventListener('click', async () => {
    initAudioContext();
    initSpeechRecognition();
    isRunning = true;

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, facingMode: "user" }, 
            video: false 
        });

        mediaStreamSource = audioCtx.createMediaStreamSource(localStream);

        // 1. 低域フィルター (lowshelf: 指定周波数以下を一括で音量変更)
        lowFilter = audioCtx.createBiquadFilter();
        lowFilter.type = "lowshelf";
        lowFilter.frequency.value = sliders.lowFreq.el.value;
        lowFilter.gain.value = sliders.lowGain.el.value;

        // 2. 中域フィルター (peaking: 指定周波数の前後をピンポイントで音量変更)
        midFilter = audioCtx.createBiquadFilter();
        midFilter.type = "peaking";
        midFilter.frequency.value = sliders.midFreq.el.value;
        midFilter.Q.value = 1.0;
        midFilter.gain.value = sliders.midGain.el.value;

        // 3. 高域フィルター (highshelf: 指定周波数以上を一括で音量変更)
        highFilter = audioCtx.createBiquadFilter();
        highFilter.type = "highshelf";
        highFilter.frequency.value = sliders.highFreq.el.value;
        highFilter.gain.value = sliders.highGain.el.value;

        // 4. 全体アンプ (スライダーの初期値 20倍 を適用、最大100倍)
        masterGain = audioCtx.createGain();
        masterGain.gain.value = parseFloat(volumeSlider.value); 

        // 5. ステレオ結合ルーティング
        splitter = audioCtx.createChannelSplitter(1);
        merger = audioCtx.createChannelMerger(2);

        // 直列接続：マイク ＞ 低音EQ ＞ 中音EQ ＞ 高音EQ ＞ アンプ ＞ 左右分配 ＞ 出力
        mediaStreamSource.connect(lowFilter);
        lowFilter.connect(midFilter);
        midFilter.connect(highFilter);
        highFilter.connect(masterGain);
        masterGain.connect(splitter);
        
        splitter.connect(merger, 0, 0); 
        splitter.connect(merger, 0, 1); 
        merger.connect(audioCtx.destination);

        // 音声認識スタート
        if (recognition) recognition.start();

        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.innerText = "⚡ フルカスタム集音＆文字起こし中...";
        statusText.style.color = "#34c759";
    } catch (err) {
        console.error(err);
        statusText.innerText = "エラー: マイクまたは音声認識の起動に失敗しました。";
        statusText.style.color = "#ff3b30";
    }
});

stopBtn.addEventListener('click', () => {
    isRunning = false;
    
    if (recognition) {
        recognition.stop();
    }

    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    
    if (mediaStreamSource) mediaStreamSource.disconnect();
    if (lowFilter) lowFilter.disconnect();
    if (midFilter) midFilter.disconnect();
    if (highFilter) highFilter.disconnect();
    if (masterGain) masterGain.disconnect();
    if (splitter) splitter.disconnect();
    if (merger) merger.disconnect();
    
    if (audioCtx) {
        audioCtx.close().then(() => {
            audioCtx = null;
        });
    }
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusText.innerText = "停止中";
    statusText.style.color = "#1d1d1f";
});
</script>

</body>
</html>
