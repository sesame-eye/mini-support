<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>両耳爆音！耳ともサポート</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 24px; color: #1d1d1f; margin-bottom: 5px; }
        p.warning { color: #ff3b30; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
        p.desc { color: #86868b; font-size: 14px; line-height: 1.5; margin-bottom: 20px;}
        button {
            font-size: 18px; font-weight: bold; padding: 18px 30px;
            border: none; border-radius: 15px; cursor: pointer;
            width: 100%; margin-top: 15px; transition: all 0.1s;
        }
        #startBtn { background-color: #0071e3; color: white; }
        #startBtn:active { background-color: #005bb5; transform: scale(0.98); }
        #stopBtn { background-color: #555; color: white; }
        #stopBtn:active { background-color: #333; transform: scale(0.98); }
        #stopBtn:disabled { background-color: #e5e5ea; color: #aeaeae; cursor:not-allowed; }
        #status { margin-top: 25px; font-size: 18px; font-weight: bold; color: #1d1d1f; }
    </style>
</head>
<body>

<div class="container">
    <h1>👂 耳ともサポート</h1>
    <h1>【左右ステレオ結合モード】</h1>
    <p class="warning">⚠️注意：音が非常に大きくなります。<br>必ずイヤホンを装着してください。</p>
    <p class="desc">マイクのモノラル音声を、内部で左右両方のチャンネルへ完全にコピーして結合しました。両耳から大音量で聞こえます。</p>
    
    <button id="startBtn">▶ 集音スタート</button>
    <button id="stopBtn" disabled>■ ストップ</button>
    
    <div id="status">停止中</div>
</div>

<script>
let audioCtx = null;
let mediaStreamSource = null;
let localStream = null;
let gainNode = null;
let splitter = null;
let merger = null;

const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusText = document.getElementById('status');

function initAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

startBtn.addEventListener('click', async () => {
    initAudioContext();

    try {
        // iOS Safariの制御不可能なマイクバグを考慮し、OS標準の最適設定でマイクを取得
        localStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { 
                echoCancellation: false, 
                noiseSuppression: false, 
                autoGainControl: false
            }, 
            video: false 
        });

        mediaStreamSource = audioCtx.createMediaStreamSource(localStream);

        // 1. アンプ（増幅器）の作成と設定
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 25.0; // 25倍増幅（好みに応じて数値を調整してください）

        // 2. ユーザー直伝：Safariのバグを回避する確実なステレオ分離・結合ルーティング
        splitter = audioCtx.createChannelSplitter(1); // モノラル入力を1つに分解
        merger = audioCtx.createChannelMerger(2);     // ステレオ出力用に2つを結合

        // 3. オーディオグラフの接続
        mediaStreamSource.connect(gainNode); // マイク ＞ 増幅器
        gainNode.connect(splitter);          // 増幅器 ＞ スプリッター

        // 分解したモノラル信号（0番目）を、マージャーの左（0番目）と右（1番目）にそれぞれ手動コピー
        splitter.connect(merger, 0, 0); // 左へ
        splitter.connect(merger, 0, 1); // 右へ

        // 最終出力をイヤホンへ
        merger.connect(audioCtx.destination);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.innerText = "⚡ 左右コピー処理で集音中...（両耳・大音量）";
        statusText.style.color = "#34c759";
    } catch (err) {
        console.error(err);
        statusText.innerText = "エラー: マイクの起動に失敗しました。";
        statusText.style.color = "#ff3b30";
    }
});

stopBtn.addEventListener('click', () => {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    // ノードの接続を安全に解除
    if (splitter) splitter.disconnect();
    if (merger) merger.disconnect();
    if (gainNode) gainNode.disconnect();
    
    if (audioCtx) {
        audioCtx.close().then(() => {
            audioCtx = null;
        });
    }
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusText.innerText = "停止中";
    statusText.style.color = "#1d1d1f";
});
</script>

</body>
</html>
