<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声特化！耳ともサポート</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 24px; color: #1d1d1f; margin-bottom: 5px; }
        p.warning { color: #ff3b30; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
        p.desc { color: #86868b; font-size: 14px; line-height: 1.5; margin-bottom: 20px;}
        button {
            font-size: 18px; font-weight: bold; padding: 18px 30px;
            border: none; border-radius: 15px; cursor: pointer;
            width: 100%; margin-top: 15px; transition: all 0.1s;
        }
        #startBtn { background-color: #0071e3; color: white; }
        #startBtn:active { background-color: #005bb5; transform: scale(0.98); }
        #stopBtn { background-color: #555; color: white; }
        #stopBtn:active { background-color: #333; transform: scale(0.98); }
        #stopBtn:disabled { background-color: #e5e5ea; color: #aeaeae; cursor:not-allowed; }
        #status { margin-top: 25px; font-size: 18px; font-weight: bold; color: #1d1d1f; }
    </style>
</head>
<body>

<div class="container">
    <h1>👂 耳ともサポート</h1>
    <h1>【音声くっきりモード】</h1>
    <p class="warning">⚠️注意：音が大きく増幅されます。<br>必ずイヤホンを装着してください。</p>
    <p class="desc">風切り音などの不快な雑音を大幅にカットし、人の声の周波数（中高音域）だけを狙って強力に増幅します。</p>
    
    <button id="startBtn">▶ 集音スタート</button>
    <button id="stopBtn" disabled>■ ストップ</button>
    
    <div id="status">停止中</div>
</div>

<script>
let audioCtx = null;
let mediaStreamSource = null;
let localStream = null;
let lowCutFilter = null;   // 低音カット用
let voiceBoostFilter = null; // 声の強調用
let gainNode = null;
let splitter = null;
let merger = null;

const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusText = document.getElementById('status');

function initAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

startBtn.addEventListener('click', async () => {
    initAudioContext();

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
            video: false 
        });

        mediaStreamSource = audioCtx.createMediaStreamSource(localStream);

        // 1. 【ノイズ対策】ハイパスフィルター（低音カット）の設定
        // 350Hz以下の「ボボボ」「ゴー」という風切り音や環境音をバッサリ削る
        lowCutFilter = audioCtx.createBiquadFilter();
        lowCutFilter.type = "highpass";
        lowCutFilter.frequency.value = 350; 

        // 2. 【人の声強調】ピーキングフィルター（特定の帯域を狙い撃ち）の設定
        // 人の声の輪郭（子音など）が一番集まる 2500Hz をピンポイントで 12分音量を上げる
        voiceBoostFilter = audioCtx.createBiquadFilter();
        voiceBoostFilter.type = "peaking";
        voiceBoostFilter.frequency.value = 2500;
        voiceBoostFilter.Q.value = 1.0;          // 影響を与える帯域の広さ（1.0で程よくマイルドに）
        voiceBoostFilter.gain.value = 12.0;       // 2500Hz付近をさらに +12dB ブースト

        // 3. 全体アンプ（増幅器）の作成
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 20.0; // フィルターで声が引き立つので、全体ゲインは少し抑えめの20倍に

        // 4. ステレオ分離・結合（前回のルーティングを維持）
        splitter = audioCtx.createChannelSplitter(1);
        merger = audioCtx.createChannelMerger(2);

        // 5. 【重要】数珠つなぎに接続（直列のオーディオグラフ）
        // マイク ＞ 低音カット ＞ 声強調 ＞ アンプ ＞ スプリッター ＞ マージャー ＞ 出力
        mediaStreamSource.connect(lowCutFilter);
        lowCutFilter.connect(voiceBoostFilter);
        voiceBoostFilter.connect(gainNode);
        gainNode.connect(splitter);
        
        splitter.connect(merger, 0, 0); // 左へ
        splitter.connect(merger, 0, 1); // 右へ
        merger.connect(audioCtx.destination);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.innerText = "⚡ 音声特化フィルターで集音中...";
        statusText.style.color = "#34c759";
    } catch (err) {
        console.error(err);
        statusText.innerText = "エラー: マイクの起動に失敗しました。";
        statusText.style.color = "#ff3b30";
    }
});

stopBtn.addEventListener('click', () => {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    // すべての接続を安全に解除
    if (mediaStreamSource) mediaStreamSource.disconnect();
    if (lowCutFilter) lowCutFilter.disconnect();
    if (voiceBoostFilter) voiceBoostFilter.disconnect();
    if (gainNode) gainNode.disconnect();
    if (splitter) splitter.disconnect();
    if (merger) merger.disconnect();
    
    if (audioCtx) {
        audioCtx.close().then(() => {
            audioCtx = null;
        });
    }
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusText.innerText = "停止中";
    statusText.style.color = "#1d1d1f";
});
</script>

</body>
</html>
