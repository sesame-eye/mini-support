<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone本体マイク集音器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 24px; color: #1d1d1f; margin-bottom: 5px; }
        p.warning { color: #ff3b30; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
        p.desc { color: #86868b; font-size: 14px; line-height: 1.5; margin-bottom: 20px;}
        button {
            font-size: 18px; font-weight: bold; padding: 18px 30px;
            border: none; border-radius: 15px; cursor: pointer;
            width: 100%; margin-top: 15px; transition: all 0.1s;
        }
        #startBtn { background-color: #0071e3; color: white; }
        #startBtn:active { background-color: #005bb5; transform: scale(0.98); }
        #stopBtn { background-color: #555; color: white; }
        #stopBtn:active { background-color: #333; transform: scale(0.98); }
        #stopBtn:disabled { background-color: #e5e5ea; color: #aeaeae; cursor:not-allowed; }
        #status { margin-top: 25px; font-size: 18px; font-weight: bold; color: #1d1d1f; }
    </style>
</head>
<body>

<div class="container">
    <h1>👂 耳ともサポート</h1>
    <h1>【本体マイク専用モード】</h1>
    <p class="warning">⚠️注意：音が大きく増幅されます。<br>必ずイヤホンを装着してください。</p>
    <p class="desc">イヤホンのマイクではなく、<b>iPhone本体のマイク</b>を使って集音します。iPhoneの画面側を相手に向けてください。</p>
    
    <button id="startBtn">▶ 集音スタート</button>
    <button id="stopBtn" disabled>■ ストップ</button>
    
    <div id="status">停止中</div>
</div>

<script>
let audioCtx = null;
let mediaStreamSource = null;
let localStream = null;
let gainNode = null;

const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusText = document.getElementById('status');

function initAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// 利用可能な音声入力デバイス（マイク）を探す関数
async function getBuiltInMicrophoneDeviceId() {
    // 一度マイク許可を取らないとデバイス名が取得できないためダミーで要求
    await navigator.mediaDevices.getUserMedia({ audio: true });
    const devices = await navigator.mediaDevices.enumerateDevices();
    
    // iPhone本体の内蔵マイク（Built-in / iPhone Microphoneなど）を探す
    // 見つからない場合はデフォルトのマイクを使用する
    let targetId = null;
    for (const device of devices) {
        if (device.kind === 'audioinput') {
            const label = device.label.toLowerCase();
            // イヤホン（headset / microphone）以外の、本体マイク（iphone / built-in）を優先
            if (label.includes('iphone') || label.includes('built-in') || label.includes('internal')) {
                targetId = device.deviceId;
                break;
            }
        }
    }
    return targetId;
}

startBtn.addEventListener('click', async () => {
    initAudioContext();

    try {
        // 1. iPhone本体マイクのIDを取得を試みる
        const builtInMicId = await getBuiltInMicrophoneDeviceId();
        
        // 2. 音声設定を指定してマイクを起動
        const constraints = {
            audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false,
                channelCount: 1 // 強制的にモノラルとして扱う
            },
            video: false
        };

        // 本体マイクが見つかった場合は、それを指定する
        if (builtInMicId) {
            constraints.audio.deviceId = { exact: builtInMicId };
        }

        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        mediaStreamSource = audioCtx.createMediaStreamSource(localStream);

        // 3. アンプ（増幅器）の作成
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 25.0; // 音量を25倍に設定（聞き取りにくい場合は30.0等に調整してください）

        // 4. 1チャンネル（モノラル）を左右両耳（ステレオ）へ自動分配する設定
        mediaStreamSource.channelCountMode = 'explicit';
        mediaStreamSource.channelInterpretation = 'speakers';

        // 5. 接続（マイク ＞ 増幅 ＞ 左右イヤホン）
        mediaStreamSource.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.innerText = "⚡ 本体マイクで集音中（両耳・大音量）";
        statusText.style.color = "#34c759";
    } catch (err) {
        console.error(err);
        statusText.innerText = "エラー: マイクの切り替えに失敗しました。";
        statusText.style.color = "#ff3b30";
    }
});

stopBtn.addEventListener('click', () => {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    if (gainNode) {
        gainNode.disconnect();
    }
    if (audioCtx) {
        audioCtx.close().then(() => {
            audioCtx = null;
        });
    }
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusText.innerText = "停止中";
    statusText.style.color = "#1d1d1f";
});
</script>

</body>
</html>
