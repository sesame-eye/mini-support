<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カスタム耳ともサポート</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 24px; color: #1d1d1f; margin-bottom: 5px; }
        p.warning { color: #ff3b30; font-size: 13px; font-weight: bold; margin-bottom: 15px; }
        button {
            font-size: 18px; font-weight: bold; padding: 16px 30px;
            border: none; border-radius: 15px; cursor: pointer;
            width: 100%; margin-top: 10px; transition: all 0.1s;
        }
        #startBtn { background-color: #0071e3; color: white; }
        #startBtn:active { background-color: #005bb5; transform: scale(0.98); }
        #stopBtn { background-color: #555; color: white; }
        #stopBtn:active { background-color: #333; transform: scale(0.98); }
        #stopBtn:disabled { background-color: #e5e5ea; color: #aeaeae; cursor:not-allowed; }
        
        /* コントロールパネルのスタイル */
        .control-panel {
            margin-top: 25px;
            padding: 15px;
            background-color: #f5f5f7;
            border-radius: 12px;
            text-align: left;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #1d1d1f;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 5px;
        }
        .value-disp {
            float: right;
            font-weight: normal;
            color: #0071e3;
        }
        #status { margin-top: 20px; font-size: 16px; font-weight: bold; color: #1d1d1f; text-align: center;}
    </style>
</head>
<body>

<div class="container">
    <h1>👂 耳ともサポート</h1>
    <h1>【周波数カスタム版】</h1>
    <p class="warning">⚠️注意：必ずイヤホンを装着して起動してください</p>
    
    <button id="startBtn">▶ 集音スタート</button>
    <button id="stopBtn" disabled>■ ストップ</button>
    
    <!-- リアルタイム調整パネル -->
    <div class="control-panel">
        <div class="control-group">
            <label for="freqSlider">🔊 強調する周波数: <span id="freqVal" class="value-disp">2000 Hz</span></label>
            <input type="range" id="freqSlider" min="500" max="5000" step="100" value="2000">
            <span style="font-size: 11px; color:#86868b;">低め（500Hz: 男性の声） 〜 高め（4000Hz: 女性の声・子音）</span>
        </div>
        
        <div class="control-group">
            <label for="gainSlider">🎚 強調の強さ (ブースト): <span id="gainVal" class="value-disp">12 dB</span></label>
            <input type="range" id="gainSlider" min="0" max="24" step="1" value="12">
        </div>
    </div>
    
    <div id="status">停止中</div>
</div>

<script>
let audioCtx = null;
let mediaStreamSource = null;
let localStream = null;
let lowCutFilter = null;
let voiceBoostFilter = null;
let gainNode = null;
let splitter = null;
let merger = null;

const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusText = document.getElementById('status');
const freqSlider = document.getElementById('freqSlider');
const freqVal = document.getElementById('freqVal');
const gainSlider = document.getElementById('gainSlider');
const gainVal = document.getElementById('gainVal');

function initAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// スライダーの値を画面にリアルタイム反映し、起動中ならフィルターにも即座に適用する
freqSlider.addEventListener('input', (e) => {
    const val = e.target.value;
    freqVal.innerText = val + " Hz";
    if (voiceBoostFilter) {
        // Web Audio APIのパラメータを滑らかに変更
        voiceBoostFilter.frequency.setValueAtTime(val, audioCtx.currentTime);
    }
});

gainSlider.addEventListener('input', (e) => {
    const val = e.target.value;
    gainVal.innerText = val + " dB";
    if (voiceBoostFilter) {
        voiceBoostFilter.gain.setValueAtTime(val, audioCtx.currentTime);
    }
});

startBtn.addEventListener('click', async () => {
    initAudioContext();

    try {
        // マイク設定：できる限りiPhone本体のインカメラ側マイク（user）をOSに要求する
        localStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { 
                echoCancellation: false, 
                noiseSuppression: false, 
                autoGainControl: false,
                facingMode: "user" 
            }, 
            video: false 
        });

        mediaStreamSource = audioCtx.createMediaStreamSource(localStream);

        // 1. 低音ノイズカット（風切り音対策）
        lowCutFilter = audioCtx.createBiquadFilter();
        lowCutFilter.type = "highpass";
        lowCutFilter.frequency.value = 350; 

        // 2. 音声強調フィルター（スライダーの値で初期化）
        voiceBoostFilter = audioCtx.createBiquadFilter();
        voiceBoostFilter.type = "peaking";
        voiceBoostFilter.frequency.value = freqSlider.value;
        voiceBoostFilter.Q.value = 1.2; // 少しピンポイントに強調
        voiceBoostFilter.gain.value = gainSlider.value;

        // 3. 全体マスターボリューム（一律20倍）
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 20.0; 

        // 4. ステレオ結合ルーティング（左右分離・結合）
        splitter = audioCtx.createChannelSplitter(1);
        merger = audioCtx.createChannelMerger(2);

        // 5. 接続
        mediaStreamSource.connect(lowCutFilter);
        lowCutFilter.connect(voiceBoostFilter);
        voiceBoostFilter.connect(gainNode);
        gainNode.connect(splitter);
        
        splitter.connect(merger, 0, 0); 
        splitter.connect(merger, 0, 1); 
        merger.connect(audioCtx.destination);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.innerText = "⚡ ライブ集音中（スライダーで調整可能）";
        statusText.style.color = "#34c759";
    } catch (err) {
        console.error(err);
        statusText.innerText = "エラー: マイクの起動に失敗しました。";
        statusText.style.color = "#ff3b30";
    }
});

stopBtn.addEventListener('click', () => {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    if (mediaStreamSource) mediaStreamSource.disconnect();
    if (lowCutFilter) lowCutFilter.disconnect();
    if (voiceBoostFilter) voiceBoostFilter.disconnect();
    if (gainNode) gainNode.disconnect();
    if (splitter) splitter.disconnect();
    if (merger) merger.disconnect();
    
    if (audioCtx) {
        audioCtx.close().then(() => {
            audioCtx = null;
            voiceBoostFilter = null;
        });
    }
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusText.innerText = "停止中";
    statusText.style.color = "#1d1d1f";
});
</script>

</body>
</html>
