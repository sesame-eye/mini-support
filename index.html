<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耳ともサポート</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 24px; color: #1d1d1f; margin-bottom: 10px; }
        p { color: #86868b; font-size: 14px; line-height: 1.5; }
        button {
            font-size: 18px; font-weight: bold; padding: 15px 30px;
            border: none; border-radius: 12px; cursor: pointer;
            width: 100%; margin-top: 15px; transition: all 0.2s;
        }
        #startBtn { background-color: #0071e3; color: white; }
        #startBtn:active { background-color: #005bb5; }
        #stopBtn { background-color: #ff3b30; color: white; }
        #stopBtn:active { background-color: #d63026; }
        #stopBtn:disabled { background-color: #e5e5ea; color: #aeaeae; cursor:not-allowed; }
        #status { margin-top: 20px; font-weight: bold; color: #1d1d1f; }
    </style>
</head>
<body>

<div class="container">
    <h1>👂 耳ともサポート</h1>
    <p>iPadにイヤホン（有線推奨）を接続してから、下のボタンを押してください。iPadのマイクが拾った音が大きく聞こえます。</p>
    
    <button id="startBtn">▶ 集音スタート</button>
    <button id="stopBtn" disabled>■ ストップ</button>
    
    <div id="status">停止中</div>
</div>

<script>
let audioCtx = null;
let mediaStreamSource = null;

const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusText = document.getElementById('status');

startBtn.addEventListener('click', async () => {
    try {
        // マイクの利用許可リクエスト（エコー・ノイズキャンセラーを切って超低遅延化）
        const stream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
            video: false 
        });

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mediaStreamSource = audioCtx.createMediaStreamSource(stream);

        // マイク音を出力（イヤホン）へダイレクトに接続
        mediaStreamSource.connect(audioCtx.destination);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.innerText = "⚡ 集音中...（マイクを音源に近づけてね）";
        statusText.style.color = "#34c759";
    } catch (err) {
        console.error(err);
        statusText.innerText = "エラー: マイクの許可が必要です。";
        statusText.style.color = "#ff3b30";
    }
});

stopBtn.addEventListener('click', () => {
    if (audioCtx) { audioCtx.close(); }
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusText.innerText = "停止中";
    statusText.style.color = "#1d1d1f";
});
</script>

</body>
</html>
